name: C++ Build & Test Raymaps

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -S . -B raymaps/build

      - name: Build
        run: cmake --build raymaps/build

      - name: Run tests
        run: |
          cd raymaps/build
          ctest --output-on-failure