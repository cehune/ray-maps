name: Test Raymaps (C++)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ray-maps

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure
        run: |
          cd ray-maps
          cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: 
          ctest --output-on-failure