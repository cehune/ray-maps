name: Test Segments (Python)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr2 \
            libxinerama1 \
            libxcursor1 \
            libxi6 \
            libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r segments/requirements.txt

      - name: Run pytest
        run: |
          cd segments
          pytest -v